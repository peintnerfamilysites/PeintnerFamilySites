<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Peintner Family Sites</title>
    <meta name="robots" content="noindex" />
    <script>
      const base = '/PeintnerFamilySites/';
      const path = window.location.pathname.replace(base, '');
      const query = window.location.search || '';
      const hash = window.location.hash || '';
      window.location.replace(`${base}?redirect=${encodeURIComponent(path + query + hash)}`);
    </script>
  </head>
  <body>
    Redirecting to Peintner Family Sites...
  </body>
</html>
